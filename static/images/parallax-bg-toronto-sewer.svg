<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 2400" preserveAspectRatio="xMidYMin slice" width="800" height="2400">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7ec8c8"/>
      <stop offset="22%" stop-color="#b8e0e0"/>
      <stop offset="38%" stop-color="#e8f4f4"/>
      <stop offset="52%" stop-color="#c9b8a8"/>
      <stop offset="68%" stop-color="#5c4a3a"/>
      <stop offset="100%" stop-color="#2a2218"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5f5f0"/>
      <stop offset="35%" stop-color="#e8e4dc"/>
      <stop offset="100%" stop-color="#3d3228"/>
    </linearGradient>
  </defs>
  <rect width="800" height="2400" fill="url(#sky)"/>
  <rect x="0" y="280" width="800" height="2120" fill="url(#ground)"/>
  <!-- simple city blocks -->
  <g opacity="0.85" fill="#5a9090">
    <rect x="40" y="120" width="90" height="200" rx="4"/>
    <rect x="150" y="80" width="110" height="260" rx="4"/>
    <rect x="290" y="140" width="80" height="190" rx="4"/>
    <rect x="400" y="60" width="130" height="300" rx="4"/>
    <rect x="560" y="100" width="100" height="230" rx="4"/>
    <rect x="690" y="160" width="70" height="170" rx="4"/>
  </g>
  <!-- sewer tone lower -->
  <rect x="0" y="1050" width="800" height="1350" fill="#241c16" opacity="0.55"/>
</svg>
